name: Release Skill

on:
  push:
    tags:
      - "**/v*" # e.g. scientist/scientific-academic-writing/v0.1.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract skill and version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}" # scientist/scientific-academic-writing/v0.1.0
          SKILL_PATH="${TAG%/*}"   # scientist/scientific-academic-writing
          VERSION="${TAG##*/}"     # v0.1.0
          echo "skill_path=${SKILL_PATH}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate skill.json
        run: |
          SKILL_PATH="${{ steps.meta.outputs.skill_path }}"
          python coreclaw-skills-hub/.github/scripts/validate_skill.py "coreclaw-skills-hub/skills/${SKILL_PATH}/skill.json"

      - name: Package skill as zip
        run: |
          SKILL_PATH="${{ steps.meta.outputs.skill_path }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP_NAME="${SKILL_PATH//\//-}-${VERSION}.zip"
          cd coreclaw-skills-hub/skills
          zip -r "../../${ZIP_NAME}" "${SKILL_PATH}/"
          echo "ZIP_NAME=${ZIP_NAME}" >> "${GITHUB_ENV}"

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.meta.outputs.skill_path }} ${{ steps.meta.outputs.version }}"
          files: ${{ env.ZIP_NAME }}

      - name: Update registry.json
        run: |
          SKILL_PATH="${{ steps.meta.outputs.skill_path }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${ZIP_NAME}"
          cd coreclaw-skills-hub
          python .github/scripts/update_registry.py "${SKILL_PATH}" "${VERSION}" "${ZIP_URL}"

      - name: Commit registry.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coreclaw-skills-hub/registry.json
          if git diff --cached --quiet; then
            echo "No registry changes to commit."
            exit 0
          fi
          git commit -m "chore: update registry for ${{ steps.meta.outputs.skill_path }} ${{ steps.meta.outputs.version }}"
          git push origin HEAD:main
