name: Validate Skill

on:
  pull_request:
    paths:
      - "coreclaw-skills-hub/skills/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate changed skills
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import subprocess
          import sys

          repo_root = pathlib.Path.cwd()
          skills_root = repo_root / "coreclaw-skills-hub/skills"
          validator = repo_root / "coreclaw-skills-hub/.github/scripts/validate_skill.py"

          diff_output = subprocess.run(
              ["git", "diff", "--name-only", "origin/main...HEAD"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.splitlines()

          skill_json_paths = set()
          for item in diff_output:
              path = repo_root / item
              try:
                  path.relative_to(skills_root)
              except ValueError:
                  continue

              current = path if path.is_dir() else path.parent
              while current != current.parent and current != skills_root.parent:
                  candidate = current / "skill.json"
                  if candidate.exists():
                      skill_json_paths.add(candidate)
                      break
                  if current == skills_root:
                      break
                  current = current.parent

          if not skill_json_paths:
              print("No skill changes detected.")
              raise SystemExit(0)

          for skill_json in sorted(skill_json_paths):
              subprocess.run([sys.executable, str(validator), str(skill_json)], check=True)
          PY

      - name: Generate registry preview
        run: |
          python coreclaw-skills-hub/.github/scripts/generate_registry_preview.py \
            coreclaw-skills-hub/skills \
            coreclaw-skills-hub/.artifacts/registry.preview.json

      - name: Upload registry preview
        uses: actions/upload-artifact@v4
        with:
          name: registry-preview
          path: coreclaw-skills-hub/.artifacts/registry.preview.json
