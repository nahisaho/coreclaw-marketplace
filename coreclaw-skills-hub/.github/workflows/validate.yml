name: Validate Skill

on:
  pull_request:
    paths:
      - "skills/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate changed skills
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import subprocess
          import sys

          repo_root = pathlib.Path.cwd()
          skills_root = repo_root / "skills"
          validator = repo_root / ".github/scripts/validate_skill.py"

          diff_output = subprocess.run(
              ["git", "diff", "--name-only", "origin/main...HEAD"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.splitlines()

            skill_dirs = set()
          for item in diff_output:
              path = repo_root / item
              try:
                  path.relative_to(skills_root)
              except ValueError:
                  continue

              current = path if path.is_dir() else path.parent
              while current != current.parent and current != skills_root.parent:
                  candidate = current / "SKILL.md"
                  if candidate.exists():
                    skill_dirs.add(current)
                      break
                  if current == skills_root:
                      break
                  current = current.parent

              if not skill_dirs:
              print("No skill changes detected.")
              raise SystemExit(0)

              for skill_dir in sorted(skill_dirs):
                subprocess.run([sys.executable, str(validator), str(skill_dir)], check=True)
          PY

      - name: Generate registry preview
        run: |
          python .github/scripts/generate_registry_preview.py \
            skills \
            .artifacts/registry.preview.json

      - name: Upload registry preview
        uses: actions/upload-artifact@v4
        with:
          name: registry-preview
          path: .artifacts/registry.preview.json
